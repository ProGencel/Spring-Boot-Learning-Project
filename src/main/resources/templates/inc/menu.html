<div class="list-group">
    <a class="list-group-item list-group-item-action" aria-current="true">
        <strong>Menu</strong>
    </a>

    <!-- classappend kullaninca tum sinifi silmek yerine sonuna ekliyor tum sinifin yerine koymak isteseydik direkte yapabilirdik -->
    <a href="/mvc/dashboard" class="list-group-item list-group-item-action" th:classappend = "${pageUrl.startsWith('/mvc/dashboard')} ? ' active'">
        Dashboard
    </a>

    <a href="/mvc/product" class="list-group-item list-group-item-action" th:classappend = "${pageUrl.startsWith('/mvc/product')} ? ' active'">
        Product
    </a>

    <a href="/mvc/note" class="list-group-item list-group-item-action" th:classappend = "${pageUrl.startsWith('/mvc/note')} ? ' active'">
        Note
    </a>
    

    <th:block th:if="${session.customer != null}">
        <div class="px-3 mt-3 mb-1 text-muted small" th:text="${session.customer.name + ' ' + session.customer.surname}">Account</div>
    </th:block>

    <a onclick="return logoutAnswer()" href="/mvc/customer/logout" class="list-group-item list-group-item-action"><i class="bi bi-x-square"></i> Logout</a>

</div>

<script>
    function logoutAnswer() {
        const answer = confirm("Are you sure you want to logout?");
        return answer;
    }
</script>
